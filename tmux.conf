# Prefix: C-j (avoids C-b conflict with readline word-back).
set -g prefix C-j
unbind C-b
bind C-a send-prefix

# Behaviour
set -sg escape-time 1
set -g history-limit 100000
setw -g monitor-activity off
set -g visual-activity on
setw -g aggressive-resize on
set-window-option -g automatic-rename on
set-option -g set-titles on

# vi key bindings in copy mode
set-window-option -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection

# Reload config
bind r source-file ~/.tmux.conf \; display "tmux reloaded"

# ------ THEME (tmux >= 2.9 syntax) -----------
set -g status-style 'fg=white,bg=black'
set -g window-status-style 'fg=white,bg=black,dim'
set -g window-status-current-style 'fg=red,bg=black,bold'
set -g pane-border-style 'fg=black'
set -g pane-active-border-style 'fg=black'
set -g message-style 'fg=white,bg=black,bold'
set -g display-panes-active-colour red
set -g display-panes-colour white
set-window-option -g clock-mode-colour red

# Status bar
set -g status on
set -g status-interval 5
set -g status-justify centre
set -g status-left-length 30
set -g status-left '#[fg=red,bold] #h#[default] #[fg=white,bold]|#[default] #S-#I-#P #[fg=white,bold]|#[default]'
set -g status-right-length 50
# Cross-platform load average via uptime (avoids /proc/loadavg which is Linux-only).
set -g status-right '#[fg=white,bold]|#[default] #[fg=red,bold]#(uptime | sed -E "s/.*load averages?: //" | cut -d "," -f 1-3)#[default] #[fg=white,bold]|#[default] %H:%M %d-%b-%Y '
